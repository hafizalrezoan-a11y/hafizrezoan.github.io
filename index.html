<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hafiz Al Rezoan — GIS Analyst & Geospatial Researcher</title>
<meta name="description" content="Hafiz Al Rezoan — GIS Analyst & Geospatial Researcher based in Dhaka, Bangladesh. Seven years of professional experience in spatial data analysis, remote sensing, UAV surveying, and peer-reviewed environmental research."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #f7f5ef;
  --bg-2: #ede9dc;
  --surface: #ffffff;
  --ink: #15201a;
  --ink-soft: #3a4640;
  --ink-mute: #79827d;
  --accent: #2a5a45;
  --accent-deep: #15201a;
  --accent-bright: #4ea077;
  --accent-soft: #e0ebe4;
  --ochre: #b07d3a;
  --rule: #d8d3c2;
  --rule-strong: #b3aa94;
  --container: 1340px;
  --gutter: 56px;
  --f-display: 'Fraunces', Georgia, serif;
  --f-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;}
body{ font-family: var(--f-body); background: var(--bg); color: var(--ink); font-size: 16px; line-height: 1.6; overflow-x: hidden; }
.container{ max-width: var(--container); margin: 0 auto; padding: 0 var(--gutter); }
a{ color: inherit; }
button{ font-family: inherit; cursor: pointer; }

/* Cursor spotlight that follows mouse */
.cursor-glow{ position: fixed; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(42,90,69,0.08) 0%, transparent 60%); pointer-events: none; z-index: 1; transform: translate(-50%,-50%); transition: transform 0.15s ease-out, opacity 0.3s; left: -1000px; top: -1000px; }

.scroll-progress{ position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); z-index: 200; width: 0%; }

/* NAV */
nav{ position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(247,245,239,0.85); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid var(--rule); }
.nav-inner{ max-width: var(--container); margin: 0 auto; padding: 18px var(--gutter); display: flex; justify-content: space-between; align-items: center; }
.nav-logo{ font-family: var(--f-display); font-weight: 600; font-size: 1.2rem; color: var(--ink); display: flex; align-items: center; gap: 10px; letter-spacing: -0.02em; }
.nav-logo .mark{ display: inline-block; width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: white; font-size: 0.78rem; font-weight: 700; font-family: var(--f-body); display: inline-flex; align-items: center; justify-content: center; }
.nav-links{ display: flex; gap: 6px; list-style: none; align-items: center; }
.nav-links a{ font-size: 0.85rem; font-weight: 500; color: var(--ink-soft); text-decoration: none; transition: all 0.2s; padding: 8px 14px; border-radius: 100px; }
.nav-links a:hover{ background: var(--accent-soft); color: var(--accent); }
.nav-cta{ font-size: 0.85rem !important; font-weight: 500; padding: 10px 22px !important; background: var(--ink) !important; color: var(--bg) !important; border-radius: 100px; text-decoration: none; }
.nav-cta:hover{ background: var(--accent) !important; color: white !important; }

/* HERO — MASSIVE TYPE */
.hero{ padding: 170px 0 100px; position: relative; }
.hero-meta-row{ display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; flex-wrap: wrap; gap: 20px; }
.hero-status{ display: inline-flex; align-items: center; gap: 12px; padding: 9px 18px 9px 16px; background: var(--surface); border: 1px solid var(--rule); border-radius: 100px; font-size: 0.82rem; font-weight: 500; color: var(--ink-soft); }
.hero-status .live-dot{ width: 8px; height: 8px; border-radius: 50%; background: #4caf50; box-shadow: 0 0 0 4px rgba(76,175,80,0.18); animation: livePulse 2s ease-in-out infinite; }
@keyframes livePulse{ 0%,100%{ box-shadow: 0 0 0 4px rgba(76,175,80,0.18); } 50%{ box-shadow: 0 0 0 8px rgba(76,175,80,0); } }
.hero-location{ font-size: 0.82rem; color: var(--ink-mute); display: flex; align-items: center; gap: 8px; }
.hero-location svg{ width: 14px; height: 14px; }

.hero h1{ font-family: var(--f-display); font-weight: 300; font-size: clamp(4rem, 11vw, 11rem); line-height: 0.88; letter-spacing: -0.045em; color: var(--ink); margin-bottom: 30px; position: relative; }
.hero h1 .l{ display: block; position: relative; }
.hero h1 em{ font-style: italic; font-weight: 500; color: var(--accent); }
.hero h1 .underline{ position: relative; display: inline-block; }
.hero h1 .underline::after{ content: ''; position: absolute; left: 0; bottom: 0.08em; width: 100%; height: 0.12em; background: var(--ochre); opacity: 0.4; z-index: -1; }
.hero h1 .ampersand{ font-family: var(--f-display); font-style: italic; color: var(--ochre); font-weight: 400; }

.hero-bottom{ display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: end; margin-top: 60px; padding-top: 36px; border-top: 1px solid var(--rule); }

.hero-main{ display: grid; grid-template-columns: 1fr 420px; gap: 70px; align-items: center; }

/* HERO PORTRAIT */
.hero-portrait-col{ display: flex; flex-direction: column; align-items: center; text-align: center; gap: 28px; padding: 44px 36px; background: var(--surface); border: 1px solid var(--rule); border-radius: 32px; box-shadow: 0 24px 60px -25px rgba(21,32,26,0.28); }
.hero-portrait{ position: relative; width: 100%; aspect-ratio: 4 / 5; border-radius: 24px; background: var(--accent-soft); border: 4px solid var(--bg); box-shadow: 0 18px 44px -12px rgba(21,32,26,0.35), 0 0 0 1px var(--rule); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.hero-portrait img{ width: 100%; height: 100%; object-fit: cover; }
.hero-portrait-initials{ font-family: var(--f-display); font-size: 6.5rem; color: var(--accent); font-weight: 500; letter-spacing: -0.02em; }
.hero-portrait-meta{ font-size: 1.05rem; color: var(--ink-soft); line-height: 1.5; }
.hero-portrait-meta b{ display: block; font-family: var(--f-display); font-size: 1.95rem; color: var(--ink); font-weight: 500; letter-spacing: -0.015em; margin-bottom: 8px; }
.hero-portrait-tag{ display: inline-block; margin-top: 14px; font-size: 0.74rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); padding: 8px 18px; background: var(--accent-soft); border-radius: 100px; }

.hero-lead{ font-size: 1.2rem; line-height: 1.55; color: var(--ink-soft); max-width: 540px; font-weight: 400; }
.hero-lead strong{ color: var(--ink); font-weight: 600; }
.hero-cta-row{ display: flex; gap: 14px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
.btn{ font-family: var(--f-body); font-size: 0.92rem; font-weight: 500; padding: 15px 28px; text-decoration: none; border-radius: 100px; transition: all 0.25s; display: inline-flex; align-items: center; gap: 10px; cursor: pointer; border: 1px solid transparent; }
.btn-primary{ background: var(--ink); color: var(--bg); border-color: var(--ink); }
.btn-primary:hover{ background: var(--accent); border-color: var(--accent); transform: translateY(-2px); }
.btn-secondary{ background: transparent; color: var(--ink); border-color: var(--rule-strong); }
.btn-secondary:hover{ border-color: var(--ink); transform: translateY(-2px); }
.btn-sm{ font-size: 0.85rem; padding: 11px 22px; }

/* MARQUEE */
.marquee{ overflow: hidden; padding: 28px 0; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); background: var(--accent-deep); position: relative; }
.marquee-track{ display: flex; gap: 60px; animation: marquee 50s linear infinite; white-space: nowrap; width: max-content; }
.marquee-item{ font-family: var(--f-display); font-style: italic; font-size: 1.6rem; color: var(--bg); display: inline-flex; align-items: center; gap: 60px; font-weight: 400; }
.marquee-item::after{ content: '✦'; color: var(--accent-bright); font-style: normal; font-size: 0.8em; }
@keyframes marquee{ from{ transform: translateX(0); } to{ transform: translateX(-50%); } }

/* SECTIONS */
section{ padding: 130px 0; position: relative; }
section.alt{ background: var(--bg-2); }
.section-head{ margin-bottom: 70px; }
.section-head.with-action{ display: flex; justify-content: space-between; align-items: flex-end; gap: 32px; flex-wrap: wrap; }
.section-head.with-action > div:first-child{ max-width: 820px; flex: 1; }
.kicker{ font-size: 0.72rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; display: inline-flex; align-items: center; gap: 10px; }
.kicker .num{ font-family: var(--f-display); font-size: 0.95rem; font-weight: 600; color: var(--ink-mute); font-style: italic; }
.section-title{ font-family: var(--f-display); font-weight: 300; font-size: clamp(2.4rem, 6vw, 5.5rem); line-height: 0.96; letter-spacing: -0.035em; color: var(--ink); }
.section-title em{ font-style: italic; font-weight: 500; color: var(--accent); }
.section-sub{ font-size: 1.1rem; color: var(--ink-soft); margin-top: 20px; line-height: 1.6; max-width: 720px; }

/* ABOUT */
.about-grid{ display: grid; grid-template-columns: 1fr 1.3fr; gap: 80px; align-items: start; }
.stats{ display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; }
.stat{ padding: 32px 24px 32px 0; border-top: 1px solid var(--rule); }
.stat:nth-child(odd){ border-right: 1px solid var(--rule); padding-right: 24px; }
.stat:nth-child(even){ padding-left: 24px; padding-right: 0; }
.stat-num{ font-family: var(--f-display); font-size: 4rem; font-weight: 300; line-height: 1; color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: -0.03em; margin-bottom: 10px; transition: color 0.3s; }
.stat:hover .stat-num{ color: var(--accent); }
.stat-num .unit{ font-size: 1.1rem; color: var(--ink-mute); font-weight: 400; margin-left: 2px; }
.stat-label{ font-size: 0.85rem; color: var(--ink-mute); letter-spacing: 0.02em; }
.about-prose p{ font-size: 1.25rem; line-height: 1.65; color: var(--ink-soft); margin-bottom: 26px; font-weight: 400; }
.about-prose p:last-child{ margin-bottom: 0; }
.about-prose strong{ color: var(--ink); font-weight: 600; font-style: italic; font-family: var(--f-display); font-size: 1.32rem; }

/* EDUCATION TIMELINE */
.timeline{ position: relative; }
.tl-item{ display: grid; grid-template-columns: 200px 1fr 220px; gap: 50px; padding: 50px 0; border-top: 1px solid var(--rule); align-items: start; transition: all 0.3s; position: relative; }
.tl-item:last-child{ border-bottom: 1px solid var(--rule); }
.tl-item:hover{ background: var(--surface); padding-left: 28px; padding-right: 28px; }
.tl-date{ font-family: var(--f-display); font-style: italic; font-size: 1.05rem; color: var(--ink-mute); font-weight: 500; }
.tl-school{ font-family: var(--f-display); font-weight: 400; font-size: clamp(1.6rem, 2.5vw, 2.4rem); line-height: 1.1; color: var(--ink); letter-spacing: -0.02em; margin-bottom: 12px; transition: color 0.3s; }
.tl-item:hover .tl-school{ color: var(--accent); }
.tl-degree{ font-size: 0.98rem; color: var(--accent); font-weight: 500; margin-bottom: 16px; }
.tl-desc{ font-size: 1rem; color: var(--ink-soft); line-height: 1.65; max-width: 620px; }
.tl-grade-block{ text-align: right; }
.tl-grade-num{ font-family: var(--f-display); font-size: 3rem; font-weight: 400; color: var(--ink); line-height: 1; letter-spacing: -0.025em; }
.tl-grade-num em{ font-style: italic; color: var(--accent); }
.tl-grade-lbl{ font-size: 0.78rem; color: var(--ink-mute); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 8px; }

/* SPOTLIGHT */
.spotlight{ background: var(--surface); border: 1px solid var(--rule); border-radius: 0; padding: 70px 60px; position: relative; overflow: hidden; transition: all 0.35s; }
.spotlight:hover{ background: var(--ink); color: var(--bg); }
.spotlight:hover .spotlight-tag, .spotlight:hover .spotlight-stats, .spotlight:hover .sp-stat .lbl{ color: var(--accent-bright); }
.spotlight:hover h3, .spotlight:hover .sp-stat .num{ color: var(--bg); }
.spotlight:hover h3 em{ color: var(--accent-bright); }
.spotlight:hover p{ color: rgba(247,245,239,0.8); }
.spotlight:hover .btn-secondary{ border-color: var(--accent-bright); color: var(--accent-bright); }
.spotlight-tag{ font-size: 0.72rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 28px; transition: color 0.3s; }
.spotlight h3{ font-family: var(--f-display); font-weight: 300; font-size: clamp(2rem, 4.5vw, 3.8rem); line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 28px; color: var(--ink); transition: color 0.3s; }
.spotlight h3 em{ font-style: italic; font-weight: 500; color: var(--accent); transition: color 0.3s; }
.spotlight p{ font-size: 1.15rem; line-height: 1.65; color: var(--ink-soft); max-width: 720px; margin-bottom: 34px; transition: color 0.3s; }
.spotlight-stats{ display: flex; gap: 60px; flex-wrap: wrap; padding-top: 36px; border-top: 1px solid var(--rule); margin-top: 8px; transition: border-color 0.3s; }
.spotlight:hover .spotlight-stats{ border-color: rgba(255,255,255,0.15); }
.sp-stat .num{ font-family: var(--f-display); font-size: 2.6rem; font-weight: 400; color: var(--ink); line-height: 1; letter-spacing: -0.02em; transition: color 0.3s; }
.sp-stat .lbl{ font-size: 0.75rem; color: var(--ink-mute); margin-top: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; transition: color 0.3s; }

/* PUBLICATIONS */
.pubs-list{ border-top: 1px solid var(--rule); }
.pub-item{ display: grid; grid-template-columns: 120px 1fr 100px; gap: 40px; padding: 36px 0; border-bottom: 1px solid var(--rule); align-items: start; transition: all 0.3s; position: relative; cursor: pointer; }
.pub-item::before{ content: ''; position: absolute; left: -56px; top: 50%; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); transform: translateY(-50%) scale(0); transition: transform 0.3s; }
.pub-item:hover::before{ transform: translateY(-50%) scale(1); }
.pub-item:hover{ background: var(--surface); padding-left: 28px; padding-right: 28px; }
.pub-year{ font-family: var(--f-display); font-weight: 500; font-size: 2.3rem; color: var(--ink); line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; transition: color 0.3s; }
.pub-item:hover .pub-year{ color: var(--accent); }
.pub-title{ font-family: var(--f-display); font-size: 1.42rem; font-weight: 400; color: var(--ink); line-height: 1.35; margin-bottom: 14px; display: block; letter-spacing: -0.015em; }
.pub-authors{ font-size: 0.92rem; color: var(--ink-soft); line-height: 1.55; margin-bottom: 8px; display: block; }
.pub-authors strong{ color: var(--accent); font-weight: 600; }
.pub-journal{ font-size: 0.85rem; color: var(--ink-mute); font-style: italic; font-family: var(--f-display); }
.pub-link{ font-size: 0.85rem; font-weight: 500; color: var(--ink); text-decoration: none; padding: 8px 14px; border-radius: 100px; border: 1px solid var(--rule-strong); justify-self: end; transition: all 0.25s; }
.pub-link:hover{ background: var(--ink); color: var(--bg); border-color: var(--ink); }

/* PROJECTS */
.projects-grid{ display: grid; grid-template-columns: repeat(6, 1fr); gap: 20px; grid-auto-flow: dense; }
.project-card{ background: var(--surface); border: 1px solid var(--rule); border-radius: 24px; overflow: hidden; transition: all 0.4s; position: relative; display: flex; flex-direction: column; grid-column: span 2; }
.project-card:nth-child(1){ grid-column: span 4; }
.project-card:nth-child(2){ grid-column: span 2; }
.project-card:nth-child(3){ grid-column: span 3; }
.project-card:nth-child(4){ grid-column: span 3; }
.project-card:hover{ transform: translateY(-6px); box-shadow: 0 30px 60px -30px rgba(21,32,26,0.35); border-color: var(--accent); }
.project-thumb{ position: relative; aspect-ratio: 16/10; background: linear-gradient(135deg, var(--accent-soft), var(--bg-2)); overflow: hidden; display: flex; align-items: center; justify-content: center; }
.project-card:nth-child(1) .project-thumb{ aspect-ratio: 21/9; }
.project-thumb img{ width: 100%; height: 100%; object-fit: cover; display: block; animation: kenBurns 16s ease-in-out infinite; transform-origin: center center; }
.project-thumb video{ width: 100%; height: 100%; object-fit: cover; display: block; }
.project-thumb .video-badge{ position: absolute; bottom: 14px; right: 14px; background: rgba(21,32,26,0.85); color: white; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 12px; border-radius: 100px; backdrop-filter: blur(8px); display: inline-flex; align-items: center; gap: 6px; }
.project-thumb .video-badge::before{ content: '▶'; font-size: 0.7em; }
.project-card:hover .project-thumb img{ animation-play-state: paused; transform: scale(1.05); transition: transform 0.6s ease-out; }
@keyframes kenBurns{
  0%{ transform: scale(1) translate(0,0); }
  25%{ transform: scale(1.07) translate(-1.2%, -0.8%); }
  50%{ transform: scale(1.09) translate(0.8%, -1.2%); }
  75%{ transform: scale(1.06) translate(1%, 1%); }
  100%{ transform: scale(1) translate(0,0); }
}
.project-thumb .placeholder-mark{ font-family: var(--f-display); font-size: 3.5rem; color: var(--accent); opacity: 0.5; font-style: italic; }
.project-role-tag{ position: absolute; top: 16px; left: 16px; background: var(--ink); color: white; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 7px 16px; border-radius: 100px; }
.project-body{ padding: 32px 36px 36px; flex: 1; display: flex; flex-direction: column; }
.project-meta-top{ display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 10px; }
.project-year{ font-family: var(--f-display); font-style: italic; font-size: 1rem; color: var(--ink-mute); font-weight: 500; }
.project-name{ font-family: var(--f-display); font-weight: 400; font-size: 1.55rem; color: var(--ink); line-height: 1.2; margin-bottom: 16px; letter-spacing: -0.02em; }
.project-card:nth-child(1) .project-name{ font-size: 2rem; }
.project-desc{ font-size: 1rem; color: var(--ink-soft); line-height: 1.6; flex: 1; }
.project-tools{ margin-top: 22px; display: flex; flex-wrap: wrap; gap: 6px; }
.project-tools .ptool{ font-size: 0.75rem; font-weight: 500; padding: 5px 12px; background: var(--bg-2); color: var(--ink-soft); border-radius: 100px; }
.project-link{ margin-top: 22px; font-size: 0.88rem; font-weight: 500; color: var(--accent); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: gap 0.2s; }
.project-link:hover{ gap: 11px; }

/* SKILLS */
.skills-grid{ display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.skill-card{ background: var(--surface); border: 1px solid var(--rule); border-radius: 20px; padding: 30px; transition: all 0.3s; grid-column: span 2; position: relative; overflow: hidden; }
.skill-card::before{ content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--ink); opacity: 0; transition: opacity 0.4s; z-index: 0; border-radius: inherit; }
.skill-card > *{ position: relative; z-index: 1; }
.skill-card:hover{ transform: translateY(-4px); box-shadow: 0 24px 50px -22px rgba(21,32,26,0.3); border-color: var(--ink); }
.skill-card:hover::before{ opacity: 1; }
.skill-card:hover h3, .skill-card:hover .skill-sub{ color: var(--bg); }
.skill-card:hover .chip{ background: var(--accent); color: white; border-color: var(--accent); }
.skill-card h3{ font-family: var(--f-display); font-weight: 400; font-size: 1.6rem; color: var(--ink); margin-bottom: 6px; letter-spacing: -0.015em; transition: color 0.3s; }
.skill-card .skill-sub{ font-size: 0.78rem; color: var(--ink-mute); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 22px; transition: color 0.3s; }
.skill-chips{ display: flex; flex-wrap: wrap; gap: 6px; }
.chip{ font-size: 0.82rem; font-weight: 500; padding: 6px 14px; background: var(--accent-soft); color: var(--accent); border-radius: 100px; white-space: nowrap; border: 1px solid transparent; transition: all 0.3s; }

/* EXPERIENCE */
.experience-list{ border-top: 1px solid var(--rule); }
.exp-item{ display: grid; grid-template-columns: 160px 160px 1fr 1.2fr; gap: 36px; padding: 44px 0; border-bottom: 1px solid var(--rule); transition: all 0.3s; align-items: start; }
.exp-item:hover{ background: var(--surface); padding-left: 28px; padding-right: 28px; }
.exp-thumb{ width: 160px; height: 160px; border-radius: 20px; overflow: hidden; background: linear-gradient(135deg, var(--accent-soft), var(--bg-2)); position: relative; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 12px 30px -16px rgba(21,32,26,0.25); }
.exp-thumb img{ width: 100%; height: 100%; object-fit: cover; animation: kenBurns 18s ease-in-out infinite; transform-origin: center center; }
.exp-item:hover .exp-thumb img{ animation-play-state: paused; transform: scale(1.05); transition: transform 0.6s ease-out; }
.exp-thumb-initials{ font-family: var(--f-display); font-style: italic; font-size: 2.2rem; color: var(--accent); font-weight: 500; }
.exp-date{ font-family: var(--f-display); font-style: italic; font-size: 1rem; color: var(--ink-mute); font-weight: 500; padding-top: 8px; }
.exp-role{ font-family: var(--f-display); font-weight: 400; font-size: 1.7rem; color: var(--ink); line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 6px; transition: color 0.3s; }
.exp-item:hover .exp-role{ color: var(--accent); }
.exp-org{ font-size: 0.98rem; color: var(--accent); font-weight: 500; }
.exp-tasks{ list-style: none; }
.exp-tasks li{ font-size: 0.98rem; line-height: 1.6; color: var(--ink-soft); padding-left: 22px; position: relative; margin-bottom: 8px; }
.exp-tasks li::before{ content: '→'; position: absolute; left: 0; top: 0; color: var(--accent); }

/* COURSES */
.courses-filter{ display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 36px; padding-bottom: 28px; border-bottom: 1px solid var(--rule); }
.filter-btn{ font-size: 0.85rem; font-weight: 500; padding: 10px 20px; border-radius: 100px; background: transparent; color: var(--ink-soft); border: 1px solid var(--rule-strong); transition: all 0.25s; }
.filter-btn:hover{ border-color: var(--ink); color: var(--ink); background: var(--surface); }
.filter-btn.active{ background: var(--ink); color: var(--bg); border-color: var(--ink); }
.filter-btn .count{ font-size: 0.72rem; opacity: 0.7; margin-left: 5px; font-variant-numeric: tabular-nums; }
.courses-grid{ display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
.course-card{ background: var(--surface); border: 1px solid var(--rule); border-radius: 14px; padding: 22px 26px; transition: all 0.25s; position: relative; }
.course-card:hover{ transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 14px 28px -16px rgba(21,32,26,0.25); }
.course-name{ font-size: 0.96rem; font-weight: 500; color: var(--ink); line-height: 1.4; margin-bottom: 8px; }
.course-meta{ display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: 0.8rem; color: var(--ink-mute); }
.course-org{ font-weight: 500; }
.course-duration{ font-variant-numeric: tabular-nums; font-size: 0.75rem; color: var(--accent); font-weight: 600; padding: 3px 10px; background: var(--accent-soft); border-radius: 100px; }
.scholar-note{ margin-top: 70px; padding: 50px 56px; background: var(--surface); border: 1px solid var(--rule); border-radius: 24px; }
.scholar-note .label{ font-size: 0.72rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 18px; }
.scholar-note p{ font-family: var(--f-display); font-size: 1.5rem; color: var(--ink); font-style: italic; line-height: 1.4; margin-bottom: 14px; font-weight: 400; letter-spacing: -0.01em; }
.scholar-note p:last-child{ margin-bottom: 0; font-style: normal; font-family: var(--f-body); font-size: 0.98rem; color: var(--ink-soft); font-weight: 400; }
.scholar-note strong{ font-style: normal; font-weight: 600; color: var(--accent); }

/* CONTACT */
.contact-section{ background: var(--ink); color: var(--bg); padding: 140px 0; position: relative; overflow: hidden; }
.contact-section::before{ content: ''; position: absolute; top: -10%; right: -5%; width: 700px; height: 700px; border-radius: 50%; background: radial-gradient(circle, rgba(78,160,119,0.18) 0%, transparent 65%); pointer-events: none; }
.contact-inner{ position: relative; z-index: 2; }
.contact-section .kicker{ color: var(--accent-bright); }
.contact-section .kicker .num{ color: rgba(255,255,255,0.4); }
.contact-section h2{ font-family: var(--f-display); font-weight: 300; font-size: clamp(3rem, 8vw, 7rem); line-height: 0.95; letter-spacing: -0.035em; margin-bottom: 60px; max-width: 1000px; }
.contact-section h2 em{ font-style: italic; font-weight: 500; color: var(--accent-bright); }
.contact-grid{ display: grid; grid-template-columns: repeat(3, 1fr); gap: 50px; padding-top: 50px; border-top: 1px solid rgba(255,255,255,0.15); }
.contact-block .contact-label{ font-size: 0.72rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent-bright); margin-bottom: 14px; }
.contact-value{ font-size: 1.18rem; color: var(--bg); text-decoration: none; line-height: 1.5; display: block; word-break: break-word; transition: color 0.2s; font-family: var(--f-display); font-weight: 400; }
.contact-value:hover{ color: var(--accent-bright); }
footer{ margin-top: 80px; padding-top: 36px; border-top: 1px solid rgba(255,255,255,0.15); display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: rgba(255,255,255,0.5); }

.reveal{ opacity: 0; transform: translateY(28px); transition: opacity 0.8s ease, transform 0.8s ease; }
.reveal.in-view{ opacity: 1; transform: translateY(0); }

.loading-state{ min-height: 100vh; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: var(--ink-mute); }

@media (max-width: 1100px){
  .skills-grid{ grid-template-columns: repeat(2, 1fr); }
  .skill-card, .skill-card:nth-child(n){ grid-column: span 1; }
  .projects-grid{ grid-template-columns: repeat(2, 1fr); }
  .project-card, .project-card:nth-child(n){ grid-column: span 1; }
  .exp-item{ grid-template-columns: 140px 140px 1fr; gap: 24px; }
  .exp-item .exp-tasks{ grid-column: 1 / -1; padding-top: 12px; }
}
@media (max-width: 980px){
  :root{ --gutter: 24px; }
  .nav-links{ display: none; }
  .hero{ padding: 130px 0 70px; }
  .hero-main{ grid-template-columns: 1fr; gap: 36px; }
  .hero-portrait-col{ order: -1; padding: 24px 18px; gap: 18px; }
  .hero-bottom{ grid-template-columns: 1fr; gap: 32px; }
  .hero-cta-row{ justify-content: flex-start; }
  section{ padding: 80px 0; }
  .section-head{ margin-bottom: 50px; }
  .section-head.with-action{ flex-direction: column; align-items: flex-start; }
  .about-grid{ grid-template-columns: 1fr; gap: 50px; }
  .skills-grid, .projects-grid{ grid-template-columns: 1fr; }
  .spotlight{ padding: 40px 28px; }
  .spotlight-stats{ gap: 30px; }
  .tl-item{ grid-template-columns: 1fr; gap: 16px; padding: 36px 0; }
  .tl-grade-block{ text-align: left; }
  .tl-grade-num{ font-size: 2rem; }
  .exp-item{ grid-template-columns: 1fr; gap: 16px; padding: 32px 0; }
  .exp-item:hover{ padding-left: 0; padding-right: 0; }
  .exp-thumb{ width: 100%; height: 200px; }
  .hero-portrait{ max-width: 260px; margin: 0 auto; }
  .hero-portrait-initials{ font-size: 4rem; }
  .hero-portrait-meta b{ font-size: 1.5rem; }
  .pub-item{ grid-template-columns: 1fr; gap: 12px; }
  .pub-item:hover{ padding-left: 0; padding-right: 0; }
  .pub-link{ justify-self: start; }
  .contact-section{ padding: 90px 0; }
  .contact-grid{ grid-template-columns: 1fr; gap: 32px; }
  footer{ flex-direction: column; gap: 14px; text-align: center; }
  .scholar-note{ padding: 32px 28px; }
  .stats{ grid-template-columns: 1fr; }
  .stat, .stat:nth-child(odd), .stat:nth-child(even){ padding: 24px 0; border-right: none; }
}
</style>
</head>
<body>

<div class="cursor-glow" id="cursor-glow"></div>
<div class="scroll-progress" id="scroll-progress"></div>

<div id="root">
  <div class="loading-state">Loading…</div>
</div>

<script>
function escapeHtml(s){ if(s===null||s===undefined) return ''; return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function safeHtml(s){ return s == null ? '' : String(s); }

function renderNav(d){
  return `
    <nav>
      <div class="nav-inner">
        <div class="nav-logo"><span class="mark">${escapeHtml(d.site.logoMark || 'HR')}</span> ${escapeHtml(d.site.logoName)}</div>
        <ul class="nav-links">
          <li><a href="#about">About</a></li>
          <li><a href="#education">Education</a></li>
          <li><a href="#research">Research</a></li>
          <li><a href="#projects">Projects</a></li>
          <li><a href="#skills">Skills</a></li>
          <li><a href="#courses">Training</a></li>
          <li><a href="#contact" class="nav-cta">Contact →</a></li>
        </ul>
      </div>
    </nav>
  `;
}

function renderPortrait(profile){
  if(profile.avatarUrl){
    return `<img src="${escapeHtml(profile.avatarUrl)}" alt="${escapeHtml(profile.name)}"/>`;
  }
  return `<span class="hero-portrait-initials">${escapeHtml(profile.initials || 'HR')}</span>`;
}

function renderHero(d){
  const h = d.hero;
  return `
    <header class="hero">
      <div class="container">
        <div class="hero-meta-row">
          <div class="hero-status"><span class="live-dot"></span> ${escapeHtml(h.statusText)}</div>
          <div class="hero-location">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${escapeHtml(h.locationText)}
          </div>
        </div>
        <div class="hero-main">
          <h1>
            ${(h.headlineLines || []).map(line => `<span class="l">${safeHtml(line)}</span>`).join('')}
          </h1>
          <div class="hero-portrait-col">
            <div class="hero-portrait">
              ${renderPortrait(d.profile)}
            </div>
            <div class="hero-portrait-meta">
              <b>${escapeHtml(h.portraitName)}</b>
              ${escapeHtml(h.portraitTitle)}
              ${h.portraitTag ? `<div class="hero-portrait-tag">${escapeHtml(h.portraitTag)}</div>` : ''}
            </div>
          </div>
        </div>
        <div class="hero-bottom">
          <p class="hero-lead">${safeHtml(h.lead)}</p>
          <div class="hero-cta-row">
            <a href="${escapeHtml(h.ctaSecondaryHref || '#research')}" class="btn btn-secondary">${escapeHtml(h.ctaSecondaryLabel)}</a>
            <a href="${escapeHtml(h.ctaPrimaryHref || '#contact')}" class="btn btn-primary">${escapeHtml(h.ctaPrimaryLabel)}</a>
          </div>
        </div>
      </div>
    </header>
  `;
}

function renderMarquee(d){
  const items = d.marquee || [];
  if(!items.length) return '';
  // Duplicate the list so the loop is seamless
  const doubled = [...items, ...items];
  return `
    <div class="marquee">
      <div class="marquee-track">
        ${doubled.map(t => `<div class="marquee-item">${escapeHtml(t)}</div>`).join('')}
      </div>
    </div>
  `;
}

function renderAbout(d){
  const pubCount = d.publications.length;
  const courseCount = d.courses.length;
  const userStats = d.about.stats || [];
  const stats = [
    userStats[0],
    { num: String(pubCount), unit: '', label: 'Peer-reviewed papers' },
    userStats[1],
    { num: String(courseCount), unit: '', label: 'Certifications' }
  ].filter(Boolean);

  return `
    <section id="about">
      <div class="container">
        <div class="section-head reveal">
          <div class="kicker"><span class="num">01 /</span> About</div>
          <h2 class="section-title">${safeHtml(d.about.title)}</h2>
        </div>
        <div class="about-grid reveal">
          <div class="stats">
            ${stats.map(s => `
              <div class="stat">
                <div class="stat-num">${escapeHtml(s.num)}${s.unit ? `<span class="unit">${escapeHtml(s.unit)}</span>` : ''}</div>
                <div class="stat-label">${escapeHtml(s.label)}</div>
              </div>
            `).join('')}
          </div>
          <div class="about-prose">
            ${d.about.paragraphs.map(p => `<p>${safeHtml(p)}</p>`).join('')}
          </div>
        </div>
      </div>
    </section>
  `;
}

function renderEducation(d){
  return `
    <section id="education" class="alt">
      <div class="container">
        <div class="section-head reveal">
          <div class="kicker"><span class="num">02 /</span> Education</div>
          <h2 class="section-title">Where I <em>trained.</em></h2>
        </div>
        <div class="timeline reveal">
          ${d.education.map(e => `
            <div class="tl-item">
              <div><div class="tl-date">${escapeHtml(e.date)}</div></div>
              <div>
                <div class="tl-school">${escapeHtml(e.school)}</div>
                <div class="tl-degree">${escapeHtml(e.degree)}</div>
                <p class="tl-desc">${escapeHtml(e.desc)}</p>
              </div>
              <div class="tl-grade-block">
                <div class="tl-grade-num"><em>${escapeHtml(e.grade)}</em>${escapeHtml(e.gradeMax || '')}</div>
                <div class="tl-grade-lbl">CGPA</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </section>
  `;
}

function renderResearch(d){
  const sorted = [...d.publications].sort((a, b) => (b.year || 0) - (a.year || 0));
  const f = d.featured || null;
  return `
    <section id="research">
      <div class="container">
        <div class="section-head reveal">
          <div class="kicker"><span class="num">03 /</span> Research</div>
          <h2 class="section-title">Peer-reviewed <em>contributions.</em></h2>
        </div>
        ${f ? `
          <div class="reveal" style="margin-bottom: 60px;">
            <div class="spotlight">
              <div class="spotlight-tag">${escapeHtml(f.label)}</div>
              <h3>${safeHtml(f.headline)}</h3>
              <p>${safeHtml(f.summary)}</p>
              ${f.ctaHref ? `<a href="${escapeHtml(f.ctaHref)}" target="_blank" rel="noopener" class="btn btn-secondary btn-sm">${escapeHtml(f.ctaLabel || 'Read paper →')}</a>` : ''}
              ${(f.stats && f.stats.length) ? `
                <div class="spotlight-stats">
                  ${f.stats.map(s => `
                    <div class="sp-stat">
                      <div class="num">${escapeHtml(s.num)}</div>
                      <div class="lbl">${escapeHtml(s.label)}</div>
                    </div>
                  `).join('')}
                </div>
              ` : ''}
            </div>
          </div>
        ` : ''}
        <div class="pubs-list reveal">
          ${sorted.map(p => `
            <article class="pub-item">
              <div class="pub-year">${escapeHtml(p.year || '—')}</div>
              <div>
                <span class="pub-title">${escapeHtml(p.title)}</span>
                <span class="pub-authors">${safeHtml(p.authorsHtml || escapeHtml(p.authors || ''))}</span>
                <span class="pub-journal">${escapeHtml(p.journal || '')}</span>
              </div>
              ${p.doi ? `<a class="pub-link" href="https://doi.org/${encodeURIComponent(p.doi)}" target="_blank" rel="noopener">DOI →</a>` : ''}
            </article>
          `).join('')}
        </div>
      </div>
    </section>
  `;
}

function renderProjects(d){
  const projects = d.projects || [];
  if(!projects.length) return '';
  return `
    <section id="projects" class="alt">
      <div class="container">
        <div class="section-head reveal">
          <div class="kicker"><span class="num">04 /</span> Projects</div>
          <h2 class="section-title">Selected <em>work.</em></h2>
          <p class="section-sub">Applied geospatial projects spanning remote sensing, UAV surveying, and environmental analysis.</p>
        </div>
        <div class="projects-grid reveal">
          ${projects.map(p => {
            const tools = (p.tools || '').split(',').map(t => t.trim()).filter(Boolean);
            let thumb;
            if(p.image && /\.(mp4|webm|mov)$/i.test(p.image)){
              thumb = `<video src="${escapeHtml(p.image)}" autoplay muted loop playsinline></video><span class="video-badge">Video</span>`;
            } else if(p.image){
              thumb = `<img src="${escapeHtml(p.image)}" alt="${escapeHtml(p.name)}"/>`;
            } else {
              thumb = `<span class="placeholder-mark">${escapeHtml((p.name || '').charAt(0))}</span>`;
            }
            return `
              <div class="project-card">
                <div class="project-thumb">${thumb}${p.role ? `<span class="project-role-tag">${escapeHtml(p.role)}</span>` : ''}</div>
                <div class="project-body">
                  <div class="project-meta-top">
                    <span class="project-year">${escapeHtml(p.year || '')}</span>
                  </div>
                  <div class="project-name">${escapeHtml(p.name)}</div>
                  <p class="project-desc">${escapeHtml(p.desc || '')}</p>
                  ${tools.length ? `<div class="project-tools">${tools.map(t => `<span class="ptool">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
                  ${p.link ? `<a class="project-link" href="${escapeHtml(p.link)}" target="_blank" rel="noopener">View project →</a>` : ''}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </section>
  `;
}

function renderSkills(d){
  return `
    <section id="skills">
      <div class="container">
        <div class="section-head reveal">
          <div class="kicker"><span class="num">05 /</span> Toolkit</div>
          <h2 class="section-title">Tools, languages, <em>methods.</em></h2>
        </div>
        <div class="skills-grid reveal">
          ${d.skills.map(s => `
            <div class="skill-card">
              <h3>${escapeHtml(s.heading)}</h3>
              <div class="skill-sub">${escapeHtml(s.sub)}</div>
              <div class="skill-chips">
                ${s.chips.map(c => `<span class="chip">${escapeHtml(c)}</span>`).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </section>
  `;
}

function renderExperience(d){
  return `
    <section id="experience" class="alt">
      <div class="container">
        <div class="section-head reveal">
          <div class="kicker"><span class="num">06 /</span> Experience</div>
          <h2 class="section-title">Field, lab, <em>and code.</em></h2>
        </div>
        <div class="experience-list reveal">
          ${d.experience.map(e => `
            <article class="exp-item">
              <div class="exp-thumb">
                ${e.imageUrl
                  ? `<img src="${escapeHtml(e.imageUrl)}" alt="${escapeHtml(e.org)}"/>`
                  : `<span class="exp-thumb-initials">${escapeHtml((e.org || '?').charAt(0))}</span>`
                }
              </div>
              <div class="exp-date">${escapeHtml(e.date)}</div>
              <div>
                <div class="exp-role">${escapeHtml(e.role)}</div>
                <div class="exp-org">${escapeHtml(e.org)}</div>
              </div>
              <ul class="exp-tasks">
                ${e.tasks.map(t => `<li>${escapeHtml(t)}</li>`).join('')}
              </ul>
            </article>
          `).join('')}
        </div>
      </div>
    </section>
  `;
}

function renderCourses(d){
  const all = d.courses;
  const total = all.length;
  const cats = ['All'];
  all.forEach(c => {
    const cat = c.category || c.org || 'Other';
    if(!cats.includes(cat)) cats.push(cat);
  });
  return `
    <section id="courses">
      <div class="container">
        <div class="section-head reveal">
          <div class="kicker"><span class="num">07 /</span> Continued Learning</div>
          <h2 class="section-title">Training <em>&amp; certifications.</em></h2>
        </div>
        <div class="reveal">
          <div class="courses-filter" id="courses-filter">
            ${cats.map((cat, i) => {
              const cnt = cat === 'All' ? total : all.filter(c => (c.category || c.org || 'Other') === cat).length;
              return `<button class="filter-btn ${i === 0 ? 'active' : ''}" data-filter="${escapeHtml(cat)}">${escapeHtml(cat)} <span class="count">${cnt}</span></button>`;
            }).join('')}
          </div>
          <div class="courses-grid" id="courses-grid">
            ${all.map(c => `
              <div class="course-card" data-cat="${escapeHtml(c.category || c.org || 'Other')}">
                <div class="course-name">${escapeHtml(c.name)}</div>
                <div class="course-meta">
                  <span class="course-org">${escapeHtml(c.org)} · ${escapeHtml(c.date)}</span>
                  ${c.duration ? `<span class="course-duration">${escapeHtml(c.duration)}</span>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        ${d.scholarNote ? `
          <div class="scholar-note reveal">
            <div class="label">${escapeHtml(d.scholarNote.label)}</div>
            <p>${safeHtml(d.scholarNote.mainHtml)}</p>
            ${d.scholarNote.subHtml ? `<p>${safeHtml(d.scholarNote.subHtml)}</p>` : ''}
          </div>
        ` : ''}
      </div>
    </section>
  `;
}

function renderContact(d){
  const addr = (d.contact.address || '').split('\n').map(escapeHtml).join('<br>');
  return `
    <section id="contact" class="contact-section">
      <div class="container contact-inner">
        <div class="reveal">
          <div class="kicker"><span class="num">08 /</span> Contact</div>
          <h2>${safeHtml(d.contact.heading)}</h2>
        </div>
        <div class="contact-grid reveal">
          <div class="contact-block">
            <div class="contact-label">Email</div>
            <a class="contact-value" href="mailto:${escapeHtml(d.contact.email)}">${escapeHtml(d.contact.email)}</a>
          </div>
          <div class="contact-block">
            <div class="contact-label">Telephone</div>
            <a class="contact-value" href="tel:${escapeHtml(d.contact.phoneTel || d.contact.phone)}">${escapeHtml(d.contact.phone)}</a>
          </div>
          <div class="contact-block">
            <div class="contact-label">Location</div>
            <div class="contact-value">${addr}</div>
          </div>
        </div>
        <footer>
          <div>${escapeHtml(d.footer.left)}</div>
          <div>${escapeHtml(d.footer.right)}</div>
        </footer>
      </div>
    </section>
  `;
}

function wireCourseFilters(){
  const filter = document.getElementById('courses-filter');
  const grid = document.getElementById('courses-grid');
  if(!filter || !grid) return;
  filter.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-filter]');
    if(!btn) return;
    const cat = btn.getAttribute('data-filter');
    filter.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    grid.querySelectorAll('.course-card').forEach(card => {
      const show = cat === 'All' || card.getAttribute('data-cat') === cat;
      card.style.display = show ? '' : 'none';
    });
  });
}

function wireReveal(){
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if(e.isIntersecting){ e.target.classList.add('in-view'); io.unobserve(e.target); }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
}

function wireCursorAndScroll(){
  const glow = document.getElementById('cursor-glow');
  window.addEventListener('mousemove', e => {
    glow.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%,-50%)`;
  });
  window.addEventListener('scroll', () => {
    const h = document.documentElement;
    const pct = (h.scrollTop) / (h.scrollHeight - h.clientHeight) * 100;
    document.getElementById('scroll-progress').style.width = pct + '%';
  });
}

async function loadAndRender(){
  try{
    const resp = await fetch(`data.json?t=${Date.now()}`, { cache: 'no-store' });
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    document.title = data.site.title;

    document.getElementById('root').innerHTML =
      renderNav(data) +
      renderHero(data) +
      renderMarquee(data) +
      renderAbout(data) +
      renderEducation(data) +
      renderResearch(data) +
      renderProjects(data) +
      renderSkills(data) +
      renderExperience(data) +
      renderCourses(data) +
      renderContact(data);

    wireCourseFilters();
    wireReveal();
    wireCursorAndScroll();
  }catch(err){
    document.getElementById('root').innerHTML = `
      <div class="loading-state">
        Could not load portfolio data (${escapeHtml(err.message)}).<br>
        Please refresh in a moment.
      </div>
    `;
    console.error(err);
  }
}

loadAndRender();
</script>
</body>
</html>
