<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hafiz Al Rezoan — GIS Analyst & Geospatial Researcher</title>
<meta name="description" content="Hafiz Al Rezoan — GIS Analyst & Geospatial Researcher in Dhaka, Bangladesh. Nearly seven years of professional experience in spatial data analysis, remote sensing, UAV surveying, and peer-reviewed environmental research."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #fafaf7;
  --bg-alt: #f1f0ea;
  --surface: #ffffff;
  --ink: #1a1a1a;
  --ink-soft: #444444;
  --ink-mute: #767676;
  --accent: #2a5a45;
  --accent-deep: #1a3d2e;
  --accent-soft: #e8efea;
  --rule: #e5e3dc;
  --rule-strong: #c9c6bc;

  --container: 1200px;
  --gutter: 48px;

  --f-display: 'Newsreader', Georgia, 'Times New Roman', serif;
  --f-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;}

body{
  font-family: var(--f-body);
  background: var(--bg);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.65;
  font-weight: 400;
}

.container{
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 var(--gutter);
}

a{ color: inherit; }
button{ font-family: inherit; cursor: pointer; }

/* NAV */
nav{
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(250, 250, 247, 0.92);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--rule);
}
.nav-inner{
  max-width: var(--container); margin: 0 auto;
  padding: 18px var(--gutter);
  display: flex; justify-content: space-between; align-items: center;
}
.nav-logo{
  font-family: var(--f-display);
  font-weight: 500; font-size: 1.05rem;
  letter-spacing: -0.01em; color: var(--ink);
}
.nav-logo span{ color: var(--accent); }
.nav-links{ display: flex; gap: 32px; list-style: none; }
.nav-links a{
  font-size: 0.875rem; font-weight: 500;
  color: var(--ink-soft); text-decoration: none;
  transition: color 0.2s;
}
.nav-links a:hover{ color: var(--accent); }

/* HERO */
.hero{ padding: 160px 0 100px; border-bottom: 1px solid var(--rule); }
.hero-grid{
  display: grid; grid-template-columns: 1.5fr 1fr;
  gap: 80px; align-items: center;
}
.eyebrow{
  font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 24px;
  display: flex; align-items: center; gap: 12px;
}
.eyebrow::before{ content: ''; width: 32px; height: 1px; background: var(--accent); }

.profile-row{
  display: flex; align-items: center; gap: 20px;
  margin-bottom: 32px;
}
.avatar{
  position: relative; width: 88px; height: 88px;
  border-radius: 50%; background: var(--accent-soft);
  border: 2px solid var(--rule);
  overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.avatar img{ width: 100%; height: 100%; object-fit: cover; }
.avatar-initials{
  font-family: var(--f-display);
  font-size: 2rem; font-weight: 500;
  color: var(--accent); letter-spacing: -0.02em;
}
.profile-name{
  font-family: var(--f-display);
  font-size: 1.25rem; font-weight: 500;
  color: var(--ink); line-height: 1.2; margin-bottom: 2px;
}
.profile-title{ font-size: 0.9rem; color: var(--ink-mute); }

.hero h1{
  font-family: var(--f-display);
  font-weight: 400; font-size: clamp(2.5rem, 5vw, 4rem);
  line-height: 1.1; letter-spacing: -0.02em;
  color: var(--ink); margin-bottom: 28px;
}
.hero h1 em{ font-style: italic; color: var(--accent); font-weight: 500; }
.hero-lead{
  font-size: 1.125rem; line-height: 1.6;
  color: var(--ink-soft); max-width: 560px; margin-bottom: 36px;
}
.hero-cta{ display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.btn{
  font-family: var(--f-body);
  font-size: 0.9rem; font-weight: 500;
  padding: 12px 24px; text-decoration: none;
  border-radius: 4px; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 8px;
  cursor: pointer; border: 1px solid transparent;
}
.btn-primary{
  background: var(--ink); color: var(--bg); border-color: var(--ink);
}
.btn-primary:hover{ background: var(--accent); border-color: var(--accent); }
.btn-secondary{
  background: transparent; color: var(--ink); border-color: var(--rule-strong);
}
.btn-secondary:hover{ border-color: var(--ink); }

.hero-card{
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 8px; padding: 32px;
}
.hero-card-header{
  font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-mute);
  padding-bottom: 16px; border-bottom: 1px solid var(--rule);
  margin-bottom: 20px;
}
.hero-card-row{
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 12px 0; border-bottom: 1px solid var(--rule);
  font-size: 0.95rem;
}
.hero-card-row:last-child{ border-bottom: none; padding-bottom: 0; }
.hero-card-row .label{ color: var(--ink-mute); font-size: 0.875rem; }
.hero-card-row .value{ color: var(--ink); font-weight: 500; text-align: right; }

/* SECTIONS */
section{ padding: 100px 0; border-bottom: 1px solid var(--rule); }
section.alt{ background: var(--bg-alt); }
.section-head{ margin-bottom: 64px; max-width: 760px; }
.section-eyebrow{
  font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}
.section-eyebrow span{ color: var(--ink-mute); font-weight: 500; }
.section-title{
  font-family: var(--f-display);
  font-weight: 400; font-size: clamp(2rem, 3.5vw, 2.75rem);
  line-height: 1.15; letter-spacing: -0.02em; color: var(--ink);
}
.section-title em{ font-style: italic; color: var(--accent); }

/* ABOUT */
.about-grid{
  display: grid; grid-template-columns: 1fr 1.4fr;
  gap: 80px; align-items: start;
}
.stats{ border-top: 1px solid var(--rule); }
.stat{
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 20px 0; border-bottom: 1px solid var(--rule);
}
.stat-num{
  font-family: var(--f-display);
  font-size: 2.25rem; font-weight: 500;
  line-height: 1; letter-spacing: -0.02em;
  color: var(--ink); font-variant-numeric: tabular-nums;
}
.stat-num .unit{
  font-size: 0.95rem; color: var(--accent);
  font-weight: 400; margin-left: 2px;
}
.stat-label{ font-size: 0.85rem; color: var(--ink-mute); text-align: right; max-width: 180px; }
.about-prose p{
  font-size: 1.0625rem; line-height: 1.7;
  color: var(--ink-soft); margin-bottom: 20px;
}
.about-prose p:last-child{ margin-bottom: 0; }
.about-prose strong{ color: var(--ink); font-weight: 600; }

/* EXPERIENCE */
.experience-list{ border-top: 1px solid var(--rule); }
.exp-item{
  display: grid; grid-template-columns: 200px 1fr 1.2fr;
  gap: 48px; padding: 32px 0;
  border-bottom: 1px solid var(--rule);
  transition: background 0.2s;
}
.exp-item:hover{ background: var(--bg-alt); padding-left: 16px; padding-right: 16px; }
.exp-date{ font-size: 0.875rem; color: var(--ink-mute); font-weight: 500; font-variant-numeric: tabular-nums; }
.exp-role{
  font-family: var(--f-display);
  font-size: 1.375rem; font-weight: 500;
  color: var(--ink); line-height: 1.3; margin-bottom: 6px;
}
.exp-org{ font-size: 0.95rem; color: var(--accent); font-weight: 500; }
.exp-tasks{ list-style: none; }
.exp-tasks li{
  font-size: 0.95rem; line-height: 1.55;
  color: var(--ink-soft); padding-left: 18px;
  position: relative; margin-bottom: 6px;
}
.exp-tasks li::before{
  content: ''; position: absolute; left: 0; top: 11px;
  width: 6px; height: 1px; background: var(--accent);
}

/* SKILLS */
.skills-grid{ display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
.skill-card{
  background: var(--surface); border: 1px solid var(--rule);
  border-radius: 8px; padding: 28px; transition: all 0.2s;
}
.skill-card:hover{ border-color: var(--accent); transform: translateY(-2px); }
.skill-card h3{
  font-family: var(--f-display);
  font-size: 1.25rem; font-weight: 500;
  color: var(--ink); margin-bottom: 4px;
}
.skill-card .skill-sub{
  font-size: 0.8rem; color: var(--ink-mute);
  font-weight: 500; letter-spacing: 0.04em; margin-bottom: 18px;
}
.skill-chips{ display: flex; flex-wrap: wrap; gap: 6px; }
.chip{
  font-size: 0.8125rem; font-weight: 500;
  padding: 5px 12px; background: var(--accent-soft);
  color: var(--accent-deep); border-radius: 4px; white-space: nowrap;
}

/* PUBLICATIONS */
.pubs-list{ border-top: 1px solid var(--rule); }
.pub-item{
  display: grid; grid-template-columns: 80px 1fr 100px;
  gap: 32px; padding: 32px 0;
  border-bottom: 1px solid var(--rule);
  align-items: start; transition: background 0.2s;
}
.pub-item:hover{ background: var(--bg-alt); padding-left: 16px; padding-right: 16px; }
.pub-year{
  font-family: var(--f-display);
  font-size: 1.5rem; font-weight: 500;
  color: var(--accent); line-height: 1;
  letter-spacing: -0.01em; font-variant-numeric: tabular-nums;
}
.pub-title{
  font-family: var(--f-display);
  font-size: 1.1875rem; font-weight: 500;
  color: var(--ink); line-height: 1.4;
  margin-bottom: 10px; display: block;
}
.pub-authors{
  font-size: 0.9rem; color: var(--ink-soft);
  line-height: 1.5; margin-bottom: 8px; display: block;
}
.pub-authors strong{ color: var(--accent); font-weight: 600; }
.pub-journal{ font-size: 0.825rem; color: var(--ink-mute); font-style: italic; }
.pub-link{
  font-size: 0.8125rem; font-weight: 500;
  color: var(--ink); text-decoration: none;
  display: inline-flex; align-items: center; gap: 4px;
  padding-top: 4px; justify-self: end; transition: color 0.2s;
}
.pub-link:hover{ color: var(--accent); }

/* EDUCATION */
.dual-grid{
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 64px; align-items: start;
}
.dual-col h3{
  font-family: var(--f-display);
  font-size: 1.5rem; font-weight: 500; color: var(--ink);
  margin-bottom: 24px; padding-bottom: 14px;
  border-bottom: 1px solid var(--rule);
}
.edu-card, .research-card{
  background: var(--surface); border: 1px solid var(--rule);
  border-radius: 8px; padding: 24px; margin-bottom: 16px;
  transition: all 0.2s;
}
.edu-card:hover, .research-card:hover{ border-color: var(--accent); }
.edu-degree, .research-title{
  font-family: var(--f-display);
  font-size: 1.125rem; font-weight: 500;
  color: var(--ink); line-height: 1.4; margin-bottom: 6px;
}
.edu-inst, .research-inst{
  font-size: 0.9rem; color: var(--ink-soft); margin-bottom: 16px;
}
.edu-meta, .research-meta{
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 14px; border-top: 1px solid var(--rule);
  font-size: 0.8125rem; color: var(--ink-mute); font-weight: 500;
}
.edu-grade{ color: var(--accent); font-weight: 600; }
.research-desc{
  font-size: 0.9375rem; color: var(--ink-soft);
  line-height: 1.55; margin: 8px 0 14px;
}

/* COURSES */
.courses-filter{
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--rule);
}
.filter-btn{
  font-size: 0.8125rem; font-weight: 500;
  padding: 8px 16px; border-radius: 100px;
  background: transparent; color: var(--ink-soft);
  border: 1px solid var(--rule-strong);
  transition: all 0.2s;
}
.filter-btn:hover{ border-color: var(--ink); color: var(--ink); }
.filter-btn.active{
  background: var(--ink); color: var(--bg); border-color: var(--ink);
}
.filter-btn .count{
  font-size: 0.7rem; opacity: 0.7;
  margin-left: 4px; font-variant-numeric: tabular-nums;
}

.courses-grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}
.course-card{
  background: var(--surface);
  border: 1px solid var(--rule);
  border-left: 3px solid var(--accent);
  padding: 18px 22px; border-radius: 4px;
  transition: all 0.2s;
}
.course-card:hover{
  border-left-color: var(--ink);
  background: var(--bg-alt);
}
.course-name{
  font-size: 0.9375rem; font-weight: 500;
  color: var(--ink); line-height: 1.4;
  margin-bottom: 6px;
}
.course-meta{
  display: flex; justify-content: space-between;
  align-items: center; gap: 10px;
  font-size: 0.8125rem; color: var(--ink-mute);
}
.course-org{ font-weight: 500; }
.course-duration{
  font-variant-numeric: tabular-nums;
  font-size: 0.75rem;
  color: var(--accent);
  font-weight: 500;
}

.scholar-note{
  margin-top: 60px; padding: 28px 32px;
  background: var(--surface); border: 1px solid var(--rule);
  border-radius: 8px;
}
.scholar-note .label{
  font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 10px;
}
.scholar-note p{
  font-family: var(--f-display);
  font-size: 1.125rem; color: var(--ink);
  font-style: italic; line-height: 1.5;
  margin-bottom: 8px;
}
.scholar-note p:last-child{ margin-bottom: 0; }
.scholar-note strong{ font-style: normal; font-weight: 500; }

/* CONTACT */
.contact-section{
  background: var(--ink); color: var(--bg);
  padding: 120px 0; border-bottom: none;
}
.contact-section h2{
  font-family: var(--f-display);
  font-weight: 400; font-size: clamp(2.25rem, 4.5vw, 3.5rem);
  line-height: 1.1; letter-spacing: -0.02em;
  margin-bottom: 48px; max-width: 800px;
}
.contact-section h2 em{ font-style: italic; color: #a8d5b8; }
.contact-grid{
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 40px; padding-top: 40px;
  border-top: 1px solid rgba(255,255,255,0.15);
}
.contact-block .contact-label{
  font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: #a8d5b8; margin-bottom: 10px;
}
.contact-value{
  font-size: 1.0625rem; color: var(--bg);
  text-decoration: none; line-height: 1.5;
  display: block; word-break: break-word; transition: color 0.2s;
}
.contact-value:hover{ color: #a8d5b8; }

footer{
  margin-top: 80px; padding-top: 28px;
  border-top: 1px solid rgba(255,255,255,0.15);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.8125rem; color: rgba(255,255,255,0.55);
}

/* Animations */
.reveal{
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.reveal.in-view{ opacity: 1; transform: translateY(0); }

/* Loading state */
.loading-state{
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; color: var(--ink-mute);
}

/* Responsive */
@media (max-width: 900px){
  :root{ --gutter: 24px; }
  .nav-links{ display: none; }
  .hero{ padding: 120px 0 80px; }
  .hero-grid{ grid-template-columns: 1fr; gap: 48px; }
  section{ padding: 70px 0; }
  .section-head{ margin-bottom: 40px; }
  .about-grid, .dual-grid{ grid-template-columns: 1fr; gap: 40px; }
  .skills-grid{ grid-template-columns: 1fr; }
  .exp-item{ grid-template-columns: 1fr; gap: 12px; padding: 28px 0; }
  .exp-item:hover{ padding-left: 0; padding-right: 0; }
  .pub-item{ grid-template-columns: 1fr; gap: 10px; }
  .pub-item:hover{ padding-left: 0; padding-right: 0; }
  .pub-year{ font-size: 1.125rem; }
  .pub-link{ justify-self: start; }
  .contact-section{ padding: 80px 0; }
  .contact-grid{ grid-template-columns: 1fr; gap: 28px; }
  footer{ flex-direction: column; gap: 12px; text-align: center; }
}
</style>
</head>
<body>

<div id="root">
  <div class="loading-state">Loading…</div>
</div>

<script>
/* =========================================================
   PUBLIC PORTFOLIO — read-only view
   Loads data.json (with cache-bust) and renders all sections.
   Edits happen via /admin.html.
   ========================================================= */

function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, (c) => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

function safeHtml(s){ return s == null ? '' : String(s); }

function renderNav(data){
  return `
    <nav>
      <div class="nav-inner">
        <div class="nav-logo">${escapeHtml(data.site.logoName)}<span>.</span></div>
        <ul class="nav-links">
          <li><a href="#about">About</a></li>
          <li><a href="#experience">Experience</a></li>
          <li><a href="#skills">Skills</a></li>
          <li><a href="#publications">Publications</a></li>
          <li><a href="#education">Education</a></li>
          <li><a href="#courses">Courses</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </div>
    </nav>
  `;
}

function renderAvatar(profile){
  if(profile.avatarUrl){
    return `<div class="avatar"><img src="${escapeHtml(profile.avatarUrl)}" alt="${escapeHtml(profile.name)}"/></div>`;
  }
  return `<div class="avatar"><span class="avatar-initials">${escapeHtml(profile.initials || 'HR')}</span></div>`;
}

function renderHero(data){
  const pubCount = data.publications.length;
  const courseCount = data.courses.length;
  const cardRows = [
    ...data.hero.cardRows.slice(0, 3),
    { label: 'Publications', value: `${pubCount} peer-reviewed` },
    { label: 'Courses', value: `${courseCount} completed` },
    ...data.hero.cardRows.slice(3)
  ];

  return `
    <header class="hero">
      <div class="container">
        <div class="hero-grid">
          <div>
            <div class="profile-row">
              ${renderAvatar(data.profile)}
              <div>
                <div class="profile-name">${escapeHtml(data.profile.name)}</div>
                <div class="profile-title">${escapeHtml(data.profile.shortTitle)} &middot; ${escapeHtml(data.profile.location)}</div>
              </div>
            </div>

            <div class="eyebrow">${escapeHtml(data.hero.eyebrow)}</div>
            <h1>${safeHtml(data.hero.headline)}</h1>
            <p class="hero-lead">${escapeHtml(data.hero.lead)}</p>
            <div class="hero-cta">
              <a href="#contact" class="btn btn-primary">${escapeHtml(data.hero.ctaPrimaryLabel)}</a>
              <a href="#publications" class="btn btn-secondary">${escapeHtml(data.hero.ctaSecondaryLabel)}</a>
            </div>
          </div>

          <div class="hero-card">
            <div class="hero-card-header">${escapeHtml(data.hero.cardHeading)}</div>
            ${cardRows.map(r => `
              <div class="hero-card-row">
                <span class="label">${escapeHtml(r.label)}</span>
                <span class="value">${escapeHtml(r.value)}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </header>
  `;
}

function renderAbout(data){
  const pubCount = data.publications.length;
  const courseCount = data.courses.length;
  const userStats = data.about.stats || [];
  // Compose: stat[0] (years), pub count, stat[1] (GPA), course count
  const stats = [
    userStats[0],
    { num: String(pubCount), unit: '', label: 'Peer-reviewed publications' },
    userStats[1],
    { num: String(courseCount), unit: '', label: 'Courses & certifications' }
  ].filter(Boolean);

  return `
    <section id="about">
      <div class="container">
        <div class="section-head reveal">
          <div class="section-eyebrow"><span>01</span> &middot; About</div>
          <h2 class="section-title">${safeHtml(data.about.title)}</h2>
        </div>

        <div class="about-grid reveal">
          <div class="stats">
            ${stats.map(s => `
              <div class="stat">
                <div class="stat-num">${escapeHtml(s.num)}${s.unit ? `<span class="unit">${escapeHtml(s.unit)}</span>` : ''}</div>
                <div class="stat-label">${escapeHtml(s.label)}</div>
              </div>
            `).join('')}
          </div>

          <div class="about-prose">
            ${data.about.paragraphs.map(p => `<p>${safeHtml(p)}</p>`).join('')}
          </div>
        </div>
      </div>
    </section>
  `;
}

function renderExperience(data){
  return `
    <section id="experience" class="alt">
      <div class="container">
        <div class="section-head reveal">
          <div class="section-eyebrow"><span>02</span> &middot; Experience</div>
          <h2 class="section-title">Field, lab, <em>and everywhere in between</em>.</h2>
        </div>

        <div class="experience-list reveal">
          ${data.experience.map(e => `
            <article class="exp-item">
              <div class="exp-date">${escapeHtml(e.date)}</div>
              <div>
                <div class="exp-role">${escapeHtml(e.role)}</div>
                <div class="exp-org">${escapeHtml(e.org)}</div>
              </div>
              <ul class="exp-tasks">
                ${e.tasks.map(t => `<li>${escapeHtml(t)}</li>`).join('')}
              </ul>
            </article>
          `).join('')}
        </div>
      </div>
    </section>
  `;
}

function renderSkills(data){
  return `
    <section id="skills">
      <div class="container">
        <div class="section-head reveal">
          <div class="section-eyebrow"><span>03</span> &middot; Toolkit</div>
          <h2 class="section-title">Tools, languages, <em>and methods</em>.</h2>
        </div>

        <div class="skills-grid reveal">
          ${data.skills.map(s => `
            <div class="skill-card">
              <h3>${escapeHtml(s.heading)}</h3>
              <div class="skill-sub">${escapeHtml(s.sub)}</div>
              <div class="skill-chips">
                ${s.chips.map(c => `<span class="chip">${escapeHtml(c)}</span>`).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </section>
  `;
}

function renderPublications(data){
  const sorted = [...data.publications].sort((a, b) => (b.year || 0) - (a.year || 0));
  return `
    <section id="publications" class="alt">
      <div class="container">
        <div class="section-head reveal">
          <div class="section-eyebrow"><span>04</span> &middot; Publications</div>
          <h2 class="section-title">Peer-reviewed contributions to <em>environmental science</em>.</h2>
        </div>

        <div class="pubs-list reveal">
          ${sorted.map(p => `
            <article class="pub-item">
              <div class="pub-year">${escapeHtml(p.year || '—')}</div>
              <div>
                <span class="pub-title">${escapeHtml(p.title)}</span>
                <span class="pub-authors">${safeHtml(p.authorsHtml || escapeHtml(p.authors || ''))}</span>
                <span class="pub-journal">${safeHtml(p.journalHtml || `<em>${escapeHtml(p.journal || '')}</em>`)}</span>
              </div>
              ${p.doi ? `<a class="pub-link" href="https://doi.org/${encodeURIComponent(p.doi)}" target="_blank" rel="noopener">DOI →</a>` : ''}
            </article>
          `).join('')}
        </div>
      </div>
    </section>
  `;
}

function renderEducation(data){
  return `
    <section id="education">
      <div class="container">
        <div class="section-head reveal">
          <div class="section-eyebrow"><span>05</span> &middot; Education &amp; Research</div>
          <h2 class="section-title">Formal training, <em>field practice</em>.</h2>
        </div>

        <div class="dual-grid reveal">
          <div class="dual-col">
            <h3>Education</h3>
            ${data.education.map(e => `
              <article class="edu-card">
                <div class="edu-degree">${escapeHtml(e.degree)}</div>
                <div class="edu-inst">${escapeHtml(e.institution)}</div>
                <div class="edu-meta">
                  <span>${escapeHtml(e.dates)}</span>
                  ${e.grade ? `<span class="edu-grade">${escapeHtml(e.grade)}</span>` : ''}
                </div>
              </article>
            `).join('')}
          </div>

          <div class="dual-col">
            <h3>Student Research</h3>
            ${data.research.map(r => `
              <article class="research-card">
                <div class="research-title">${escapeHtml(r.title)}</div>
                <div class="research-inst">${escapeHtml(r.institution)}</div>
                <p class="research-desc">${escapeHtml(r.description)}</p>
                <div class="research-meta"><span>${escapeHtml(r.dates)}</span><span>${escapeHtml(r.role)}</span></div>
              </article>
            `).join('')}
          </div>
        </div>
      </div>
    </section>
  `;
}

function renderCourses(data){
  const all = data.courses;
  const total = all.length;

  // Build categories
  const categories = ['All'];
  all.forEach(c => {
    const cat = c.category || c.org || 'Other';
    if(!categories.includes(cat)) categories.push(cat);
  });

  return `
    <section id="courses" class="alt">
      <div class="container">
        <div class="section-head reveal">
          <div class="section-eyebrow"><span>06</span> &middot; Continued Learning</div>
          <h2 class="section-title">ESRI training, research <em>&amp; certifications</em>.</h2>
        </div>

        <div class="reveal">
          <div class="courses-filter" id="courses-filter">
            ${categories.map((cat, i) => {
              const count = cat === 'All' ? total : all.filter(c => (c.category || c.org || 'Other') === cat).length;
              return `<button class="filter-btn ${i === 0 ? 'active' : ''}" data-filter="${escapeHtml(cat)}">
                ${escapeHtml(cat)} <span class="count">${count}</span>
              </button>`;
            }).join('')}
          </div>
          <div class="courses-grid" id="courses-grid">
            ${all.map(c => `
              <div class="course-card" data-cat="${escapeHtml(c.category || c.org || 'Other')}">
                <div class="course-name">${escapeHtml(c.name)}</div>
                <div class="course-meta">
                  <span class="course-org">${escapeHtml(c.org)} &middot; ${escapeHtml(c.date)}</span>
                  ${c.duration ? `<span class="course-duration">${escapeHtml(c.duration)}</span>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        </div>

        ${data.scholarNote ? `
          <div class="scholar-note reveal">
            <div class="label">${escapeHtml(data.scholarNote.label)}</div>
            <p>${safeHtml(data.scholarNote.mainHtml)}</p>
            ${data.scholarNote.subHtml ? `<p style="font-size: 0.95rem; font-style: normal; color: var(--ink-soft); margin-top: 12px;">${safeHtml(data.scholarNote.subHtml)}</p>` : ''}
          </div>
        ` : ''}
      </div>
    </section>
  `;
}

function renderContact(data){
  const addr = (data.contact.address || '').split('\n').map(escapeHtml).join('<br>');
  return `
    <section id="contact" class="contact-section">
      <div class="container">
        <div class="reveal">
          <div class="section-eyebrow" style="color: #a8d5b8;"><span style="color: rgba(255,255,255,0.5);">07</span> &middot; Contact</div>
          <h2>${safeHtml(data.contact.heading)}</h2>
        </div>

        <div class="contact-grid reveal">
          <div class="contact-block">
            <div class="contact-label">Email</div>
            <a class="contact-value" href="mailto:${escapeHtml(data.contact.email)}">${escapeHtml(data.contact.email)}</a>
          </div>
          <div class="contact-block">
            <div class="contact-label">Telephone</div>
            <a class="contact-value" href="tel:${escapeHtml(data.contact.phoneTel || data.contact.phone)}">${escapeHtml(data.contact.phone)}</a>
          </div>
          <div class="contact-block">
            <div class="contact-label">Location</div>
            <div class="contact-value">${addr}</div>
          </div>
        </div>

        <footer>
          <div>${escapeHtml(data.footer.left)}</div>
          <div>${escapeHtml(data.footer.right)}</div>
        </footer>
      </div>
    </section>
  `;
}

function wireCourseFilters(){
  const filter = document.getElementById('courses-filter');
  const grid = document.getElementById('courses-grid');
  if(!filter || !grid) return;
  filter.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-filter]');
    if(!btn) return;
    const cat = btn.getAttribute('data-filter');
    filter.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    grid.querySelectorAll('.course-card').forEach(card => {
      const show = cat === 'All' || card.getAttribute('data-cat') === cat;
      card.style.display = show ? '' : 'none';
    });
  });
}

function wireReveal(){
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if(e.isIntersecting){ e.target.classList.add('in-view'); io.unobserve(e.target); }
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
}

async function loadAndRender(){
  try{
    // Cache-bust so updated data.json shows up immediately after admin save
    const resp = await fetch(`data.json?t=${Date.now()}`, { cache: 'no-store' });
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    document.title = data.site.title;
    document.getElementById('root').innerHTML =
      renderNav(data) +
      renderHero(data) +
      renderAbout(data) +
      renderExperience(data) +
      renderSkills(data) +
      renderPublications(data) +
      renderEducation(data) +
      renderCourses(data) +
      renderContact(data);

    wireCourseFilters();
    wireReveal();
  }catch(err){
    document.getElementById('root').innerHTML = `
      <div class="loading-state">
        Could not load portfolio data (${escapeHtml(err.message)}).<br>
        Please refresh in a moment.
      </div>
    `;
    console.error(err);
  }
}

loadAndRender();
</script>
</body>
</html>
